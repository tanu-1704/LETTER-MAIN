<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PALAK</title>
    <link rel="stylesheet" href="./style.css"></link>
</head>
<body>
    <div class="container">
        
        <div id="mainView">
            <div class="header">
                <div class="heart-icon">❤️</div>
                <h1>For You With My Full Braincells</h1>
                <p class="subtitle">A letter for each day I'm with You ❤️</p>
                <div class="day-counter" id="dayCounter"></div>
            </div>

            <div class="envelopes" id="envelopes"></div>

            <div class="drive-link-container">
                <button onclick="openVault()" class="drive-btn" style="cursor: pointer; font-family: inherit;">
                    📁 Open Voice Notes Vault
                </button>
            </div>

            <div class="footer-quote">
                "Hope You Like It" 💕
            </div>
        </div>

        <div id="vaultView" class="vault-view">
            <div class="letter-card gradient-1">
                <div class="letter-content">
                    <div class="letter-header">
                        <div class="letter-title-section">
                            <h2>Voice Notes Vault 🎧</h2>
                            <p class="letter-day">All your baatein in one place</p>
                        </div>
                        <button class="close-btn" onclick="closeVault()">×</button>
                    </div>
                    
                    <div id="vaultList" class="vault-list"></div>

                    <div class="back-btn-container">
                        <button class="back-btn" onclick="closeVault()">Back to envelopes</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="gameView" class="game-view">
            <div class="game-card" id="gameCard">
                <div class="game-content">
                    <div class="game-header">
                        <h2>Unlock Day <span id="gameDay"></span></h2>
                        <p class="game-instructions">Guess the letter word to unlock your love letter!</p>
                        <div class="hint-section" id="hintSection"></div>
                    </div>

                    <div id="guessesContainer"></div>

                    <div class="keyboard" id="keyboard"></div>

                    <div class="attempts" id="attemptsText">Attempts: <span id="attemptCount">0</span>/6</div>
                    <div class="message" id="gameMessage"></div>

                    <div class="game-back-btn">
                        <button class="back-btn" onclick="closeGame()">Back to letters</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="letterView" class="letter-view">
            <div class="letter-card" id="letterCard">
                <div class="letter-content">
                    <div class="letter-header">
                        <div class="letter-title-section">
                            <h2 id="letterTitle"></h2>
                            <p class="letter-day" id="letterDay"></p>
                        </div>
                        <button class="close-btn" onclick="closeLetter()">×</button>
                    </div>
                    
                    <div class="letter-text" id="letterText"></div>
                    <div id="voiceContainer"></div>

                    <div class="letter-heart">❤️</div>
                </div>
            </div>

            <div class="back-btn-container">
                <button class="back-btn" onclick="closeLetter()">Back to all letters</button>
            </div>
        </div>

    </div>

    <script type="module" src="./play.js"></script>
</body>
</html>
